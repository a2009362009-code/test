services:
  - type: web
    name: barbershop-booking-api
    runtime: node
    plan: free
    region: frankfurt
    branch: master
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: barbershop-postgres
          property: connectionString
      - key: PGSSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: AUTH_LOGIN_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: AUTH_LOGIN_RATE_LIMIT_MAX
        value: "10"
      - key: ADMIN_LOGIN_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: ADMIN_LOGIN_RATE_LIMIT_MAX
        value: "5"
      - key: CORS_ORIGIN
        sync: false
  - type: cron
    name: barbershop-seed-refresh
    runtime: node
    region: frankfurt
    schedule: "0 3 * * *"
    buildCommand: npm ci
    startCommand: node scripts/seed_refresh.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: barbershop-postgres
          property: connectionString
      - key: PGSSL
        value: "true"
      - key: RESET_DEMO
        value: "false"

databases:
  - name: barbershop-postgres
    databaseName: barbershop
    user: barbershop
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
